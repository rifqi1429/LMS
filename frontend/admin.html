<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backoffice ZMI LMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .sidebar-btn.active {
      background-color: white;
      color: #16a34a;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
  </style>
</head>

<body class="bg-slate-100 text-slate-900">
  <div class="flex min-h-screen">
    <aside class="w-64 bg-green-600 text-white p-6 hidden lg:block">
      <div class="mb-10">
        <h1 class="text-xl font-bold">ZMI Backoffice</h1>
        <p class="text-xs opacity-75">Control Panel v1.0</p>
      </div>
      <nav class="space-y-2">
        <button onclick="showTab('content', this)" class="sidebar-btn active w-full text-left p-3 rounded-xl transition-all flex items-center">
          <i class="fas fa-edit mr-3"></i> Konten Landing
        </button>
        <button onclick="showTab('images', this)" class="sidebar-btn w-full text-left p-3 rounded-xl transition-all flex items-center">
          <i class="fas fa-image mr-3"></i> Upload Gambar
        </button>
        <button onclick="showTab('users', this)" class="sidebar-btn w-full text-left p-3 rounded-xl transition-all flex items-center">
          <i class="fas fa-users mr-3"></i> Manajemen User
        </button>
        <button onclick="showTab('leads', this)" class="sidebar-btn w-full text-left p-3 rounded-xl transition-all flex items-center">
          <i class="fas fa-envelope mr-3"></i> Leads / Form
        </button>
        <button onclick="showTab('seo', this)" class="sidebar-btn w-full text-left p-3 rounded-xl transition-all flex items-center">
          <i class="fas fa-search mr-3"></i> SEO & Sosmed
        </button>
      </nav>
    </aside>

    <main class="flex-1 p-4 md:p-8">
      <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm">
        <h2 id="current-tab-title" class="text-2xl font-bold">Konten & Landing Page</h2>
        <button onclick="saveAllSettings()" class="bg-green-600 text-white px-6 py-3 rounded-2xl hover:bg-green-700 transition font-semibold">
          <i class="fas fa-save mr-2"></i> Simpan Perubahan
        </button>
      </header>

      <section id="tab-content" class="tab-panel space-y-6">
        <div class="bg-white p-6 rounded-3xl shadow-xl">
          <h3 class="font-bold mb-4 border-b pb-2">Hero Section</h3>
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium mb-1">Judul Hero</label>
              <input id="hero-title-input" type="text" class="w-full p-3 border rounded-xl" placeholder="Masukkan judul utama">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Sub-judul Hero</label>
              <textarea id="hero-subtitle-input" class="w-full p-3 border rounded-xl h-24"></textarea>
            </div>
          </div>
        </div>
      </section>

      <section id="tab-images" class="tab-panel hidden space-y-6">
        <div class="grid md:grid-cols-2 gap-6">
          <div class="bg-white p-6 rounded-3xl shadow-xl text-center">
            <h3 class="font-bold mb-4">Logo Website</h3>
            <div class="border-2 border-dashed rounded-2xl p-4">
              <img id="logo-preview" class="h-32 mx-auto mb-4 object-contain">
              <input type="file" id="logo-upload" class="hidden" accept="image/*">
              <button onclick="document.getElementById('logo-upload').click()" class="text-green-600 font-semibold">Pilih Gambar</button>
            </div>
          </div>
          <div class="bg-white p-6 rounded-3xl shadow-xl text-center">
            <h3 class="font-bold mb-4">Hero Background</h3>
            <div class="border-2 border-dashed rounded-2xl p-4">
              <img id="hero-preview" class="h-32 mx-auto mb-4 object-cover">
              <input type="file" id="hero-upload" class="hidden" accept="image/*">
              <button onclick="document.getElementById('hero-upload').click()" class="text-green-600 font-semibold">Pilih Gambar</button>
            </div>
          </div>
        </div>
      </section>

      <section id="tab-users" class="tab-panel hidden space-y-6">
        <div class="bg-white p-6 rounded-3xl shadow-xl">
          <div class="flex gap-4 mb-6">
            <input id="new-email" type="email" placeholder="Email Admin" class="flex-1 p-3 border rounded-xl">
            <input id="new-password" type="password" placeholder="Password" class="flex-1 p-3 border rounded-xl">
            <button onclick="addUser()" class="bg-green-600 text-white px-6 rounded-xl">Tambah</button>
          </div>
          <table class="w-full">
            <thead class="bg-slate-50">
              <tr><th class="p-4 text-left">User Email</th><th class="p-4">Aksi</th></tr>
            </thead>
            <tbody id="users-table-body"></tbody>
          </table>
        </div>
      </section>

      <section id="tab-leads" class="tab-panel hidden space-y-6">
        <div class="bg-white p-6 rounded-3xl shadow-xl">
          <h3 class="font-bold mb-4 border-b pb-2">Leads / Kontak Masuk</h3>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-slate-50">
                <tr>
                  <th class="p-4 text-left">Nama</th>
                  <th class="p-4 text-left">Email</th>
                  <th class="p-4 text-left">Pesan</th>
                  <th class="p-4 text-left">Waktu</th>
                </tr>
              </thead>
              <tbody id="leads-table-body"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="tab-seo" class="tab-panel hidden space-y-6">
        <div class="bg-white p-6 rounded-3xl shadow-xl grid gap-6">
          <h3 class="font-bold mb-4 border-b pb-2">SEO & Sosial Media</h3>
          <div class="grid gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">Judul SEO</label>
              <input id="seo-title-input" type="text" class="w-full p-3 border rounded-xl" placeholder="Judul halaman untuk SEO">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Deskripsi SEO</label>
              <textarea id="seo-description-input" class="w-full p-3 border rounded-xl h-24" placeholder="Deskripsi meta untuk SEO"></textarea>
            </div>
          </div>
          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">Link Facebook</label>
              <input id="social-facebook-input" type="url" class="w-full p-3 border rounded-xl" placeholder="https://facebook.com/..." />
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Link Instagram</label>
              <input id="social-instagram-input" type="url" class="w-full p-3 border rounded-xl" placeholder="https://instagram.com/..." />
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Link YouTube</label>
              <input id="social-youtube-input" type="url" class="w-full p-3 border rounded-xl" placeholder="https://youtube.com/..." />
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Link WhatsApp</label>
              <input id="social-whatsapp-input" type="url" class="w-full p-3 border rounded-xl" placeholder="https://wa.me/..." />
            </div>
          </div>
        </div>
      </section>

    <script src="../bacend/script.js"></script>
    </main>
  </div>

  <script>
    function showTab(tab, btn) {
      document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.add('hidden'));
      const target = document.getElementById(`tab-${tab}`);
      if (target) target.classList.remove('hidden');
      document.getElementById('current-tab-title').textContent = {
        content: 'Konten & Landing Page',
        images: 'Manajemen Gambar',
        users: 'Manajemen User',
        leads: 'Leads & Form',
        seo: 'SEO & Sosial Media'
      }[tab] || 'Konten & Landing Page';
      document.querySelectorAll('.sidebar-btn').forEach(button => button.classList.remove('active'));
      if (btn) btn.classList.add('active');
    }

    function handleImageUpload(inputId, previewId, imageKey) {
      const input = document.getElementById(inputId);
      const preview = document.getElementById(previewId);
      if (!input || !preview) return;

      input.addEventListener('change', () => {
        const file = input.files && input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          preview.src = reader.result;
          const settings = getBackofficeSettings();
          settings.images = settings.images || {};
          settings.images[imageKey] = reader.result;
          saveBackofficeSettings(settings);
        };
        reader.readAsDataURL(file);
      });
    }

    function renderUsers() {
      if (typeof getBackofficeSettings !== 'function') return;
      const settings = getBackofficeSettings();
      const tbody = document.getElementById('users-table-body');
      if (!tbody) return;
      tbody.innerHTML = '';
      const users = settings.adminUsers || [];

      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="2" class="p-4 text-center text-sm text-slate-500">Belum ada admin tambahan.</td></tr>';
        return;
      }

      users.forEach((user, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="p-4">${user.username || ''}</td>
          <td class="p-4 text-center">
            <button onclick="removeUser(${index})" class="bg-red-500 text-white px-4 py-2 rounded-xl hover:bg-red-600">Hapus</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function renderLeads() {
      if (typeof getBackofficeSettings !== 'function') return;
      const settings = getBackofficeSettings();
      const tbody = document.getElementById('leads-table-body');
      if (!tbody) return;
      tbody.innerHTML = '';
      const leads = settings.leads || [];

      if (!leads.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-sm text-slate-500">Belum ada leads masuk.</td></tr>';
        return;
      }

      leads.slice().reverse().forEach((lead) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="p-4 align-top">${lead.name || '-'}</td>
          <td class="p-4 align-top">${lead.email || '-'}</td>
          <td class="p-4 align-top">${lead.message || '-'}</td>
          <td class="p-4 align-top">${new Date(lead.createdAt).toLocaleString('id-ID') || '-'}</td>
        `;
        tbody.appendChild(row);
      });
    }

    function addUser() {
      if (typeof getBackofficeSettings !== 'function' || typeof saveBackofficeSettings !== 'function') return;
      const email = document.getElementById('new-email').value.trim();
      const password = document.getElementById('new-password').value.trim();
      if (!email || !password) {
        alert('Masukkan email dan password admin.');
        return;
      }
      const settings = getBackofficeSettings();
      settings.adminUsers = settings.adminUsers || [];
      settings.adminUsers.push({ username: email, password, role: 'admin' });
      saveBackofficeSettings(settings);
      document.getElementById('new-email').value = '';
      document.getElementById('new-password').value = '';
      renderUsers();
      alert('Admin baru berhasil ditambahkan.');
    }

    function removeUser(index) {
      if (typeof getBackofficeSettings !== 'function' || typeof saveBackofficeSettings !== 'function') return;
      const settings = getBackofficeSettings();
      if (!Array.isArray(settings.adminUsers)) return;
      settings.adminUsers.splice(index, 1);
      saveBackofficeSettings(settings);
      renderUsers();
    }

    function loadAdminSettings() {
      if (typeof getBackofficeSettings !== 'function') return;
      const settings = getBackofficeSettings();
      document.getElementById('hero-title-input').value = settings.heroTitle || '';
      document.getElementById('hero-subtitle-input').value = settings.heroSubtitle || '';
      document.getElementById('seo-title-input').value = settings.seoTitle || '';
      document.getElementById('seo-description-input').value = settings.seoDescription || '';
      document.getElementById('social-facebook-input').value = settings.socialLinks?.facebook || '';
      document.getElementById('social-instagram-input').value = settings.socialLinks?.instagram || '';
      document.getElementById('social-youtube-input').value = settings.socialLinks?.youtube || '';
      document.getElementById('social-whatsapp-input').value = settings.socialLinks?.whatsapp || '';

      const logoPreview = document.getElementById('logo-preview');
      if (logoPreview && settings.images?.logo) logoPreview.src = settings.images.logo;
      const heroPreview = document.getElementById('hero-preview');
      if (heroPreview && settings.images?.heroBackground) heroPreview.src = settings.images.heroBackground;

      renderUsers();
      renderLeads();
    }

    function saveAllSettings() {
      if (typeof getBackofficeSettings !== 'function' || typeof saveBackofficeSettings !== 'function') {
        alert('Sistem penyimpanan belum tersedia. Pastikan skrip backend terpasang.');
        return;
      }
      const settings = getBackofficeSettings();
      settings.heroTitle = document.getElementById('hero-title-input').value.trim();
      settings.heroSubtitle = document.getElementById('hero-subtitle-input').value.trim();
      settings.seoTitle = document.getElementById('seo-title-input').value.trim();
      settings.seoDescription = document.getElementById('seo-description-input').value.trim();
      settings.socialLinks = settings.socialLinks || {};
      settings.socialLinks.facebook = document.getElementById('social-facebook-input').value.trim();
      settings.socialLinks.instagram = document.getElementById('social-instagram-input').value.trim();
      settings.socialLinks.youtube = document.getElementById('social-youtube-input').value.trim();
      settings.socialLinks.whatsapp = document.getElementById('social-whatsapp-input').value.trim();
      const logoPreview = document.getElementById('logo-preview');
      const heroPreview = document.getElementById('hero-preview');
      settings.images = settings.images || {};
      if (logoPreview && logoPreview.src) settings.images.logo = logoPreview.src;
      if (heroPreview && heroPreview.src) settings.images.heroBackground = heroPreview.src;
      saveBackofficeSettings(settings);
      renderLeads();
      alert('Perubahan LMS berhasil disimpan.');
    }

    function initializeAdminPage() {
      if (typeof getBackofficeSettings !== 'function') return;
      handleImageUpload('logo-upload', 'logo-preview', 'logo');
      handleImageUpload('hero-upload', 'hero-preview', 'heroBackground');
      loadAdminSettings();
    }

    window.addEventListener('DOMContentLoaded', initializeAdminPage);
  </script>
</body>
</html>
